<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goodness Gracious</title>
  <style>
    :root {
      --bg: #0b0b0f;
      --fg: #f7f5ef;
      --accent: #e8c547;
      --muted: #9a9a9a;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 4rem 1.5rem;
    }

    header {
      text-align: center;
      margin-bottom: 4rem;
    }

    h1 {
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 0.95;
      margin: 0 0 0.5rem;
      text-transform: uppercase;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1.1rem;
      font-style: italic;
      margin: 0;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 2rem;
      justify-items: center;
    }

    .video-card {
      width: 100%;
      max-width: 400px;
    }

    .video-card iframe {
      width: 100%;
      height: 600px;
      border: none;
      border-radius: 8px;
      background: #1a1a1f;
      display: block;
    }

    @media (max-width: 600px) {
      .video-card iframe { height: 540px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Goodness<br />Gracious</h1>
      <p class="subtitle">Conversations on Jesus, truth, and the hope within us.</p>
    </header>

    <div class="video-grid">
      <div class="video-card">
        <iframe src="https://www.instagram.com/reel/DKtkfRwzyo6/embed/" allowfullscreen scrolling="no" allowtransparency="true"></iframe>
      </div>
      <div class="video-card">
        <iframe src="https://www.instagram.com/reel/DKlGODYzwd6/embed/" allowfullscreen scrolling="no" allowtransparency="true"></iframe>
      </div>
      <div class="video-card">
        <iframe src="https://www.instagram.com/reel/DK1fmjxTP-_/embed/" allowfullscreen scrolling="no" allowtransparency="true"></iframe>
      </div>
    </div>
  </div>
</body>
</html>
