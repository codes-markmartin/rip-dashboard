*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Cinzel', serif;
  overflow: hidden;
}

body::before {
  content:'';
  position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 110%, rgba(0,90,65,0.14) 0%, transparent 65%),
    radial-gradient(ellipse 50% 35% at 15% 10%,  rgba(0,229,200,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 85% 5%,   rgba(0,120,90,0.05) 0%, transparent 55%);
}

#particles { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.pt {
  position:absolute; border-radius:50%;
  background: radial-gradient(circle, rgba(0,229,200,0.55) 0%, transparent 70%);
  animation: rise linear infinite;
}
@keyframes rise {
  from { transform:translateY(105vh) scale(0.2); opacity:0; }
  8%   { opacity:0.7; }
  90%  { opacity:0.15; }
  to   { transform:translateY(-5vh) scale(1); opacity:0; }
}

#bird {
  position:fixed; z-index:999; pointer-events:none;
  font-size:36px; top:0; left:0; display:none;
  filter: drop-shadow(0 0 12px rgba(0,229,200,0.7));
  will-change:transform;
}
@keyframes birdFly {
  0%   { transform:translateX(var(--x0)) translateY(var(--y0)) scaleX(var(--flip)); }
  50%  { transform:translateX(calc((var(--x0) + var(--x1)) / 2)) translateY(calc(var(--y0) - 50px)) scaleX(var(--flip)); }
  100% { transform:translateX(var(--x1)) translateY(var(--y0)) scaleX(var(--flip)); }
}

/* Full viewport layout */
.page {
  position: relative; z-index:1;
  width: 100vw; height: 100vh;
  display: flex; flex-direction: column;
}

/* NAV */
nav {
  flex-shrink: 0;
  display:flex; align-items:center; justify-content:space-between;
  padding: 0 36px;
  height: 64px;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(20px);
  background: rgba(3,5,8,0.7);
}
.nav-brand {
  font-size: 18px; font-weight:900;
  letter-spacing: 5px; color: var(--teal);
  text-decoration:none;
  text-shadow: 0 0 28px var(--teal-glow);
}
.nav-buy {
  font-family:'Cinzel', serif;
  font-size: 12px; font-weight:700;
  letter-spacing: 2px;
  color: #030508;
  background: var(--teal);
  padding: 10px 26px;
  border-radius: 2px;
  text-decoration: none;
  transition: box-shadow .2s, transform .15s, opacity .2s;
  box-shadow: 0 0 24px rgba(0,229,200,0.3);
}
.nav-buy:hover {
  box-shadow: 0 0 48px rgba(0,229,200,0.55);
  transform: translateY(-1px);
  opacity: .9;
}

/* MAIN */
main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 24px;
}

/* TOMBSTONE */
.tomb-wrap {
  margin-bottom: 24px;
}
.tomb-wrap svg {
  width: clamp(90px, 12vw, 148px);
  height: auto;
  animation: float 6s ease-in-out infinite, glow-anim 4s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-12px); }
}
@keyframes glow-anim {
  0%,100% { filter: drop-shadow(0 0 22px rgba(0,229,200,0.35)); }
  50%      { filter: drop-shadow(0 0 60px rgba(0,229,200,0.7)); }
}

/* TITLE */
.rip-title {
  font-size: clamp(48px, 11vw, 108px);
  font-weight: 900;
  letter-spacing: 10px;
  color: var(--text);
  line-height: 1;
  text-shadow:
    0 0 60px rgba(0,229,200,0.35),
    0 0 120px rgba(0,229,200,0.12);
  margin-bottom: 6px;
}
.rip-tagline {
  font-family: 'Share Tech Mono', monospace;
  font-size: clamp(9px, 1.4vw, 11px);
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 32px;
}

/* MCAP */
.mcap-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}
.mcap-num {
  font-size: clamp(40px, 8.5vw, 76px);
  font-weight: 900;
  letter-spacing: -1px;
  color: var(--teal);
  line-height: 1;
  text-shadow: 0 0 50px rgba(0,229,200,0.5);
  margin-bottom: 8px;
}
.mcap-chg {
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px; letter-spacing: 1px;
  margin-bottom: 40px;
  min-height: 18px;
}
.pos { color: #4ade80; }
.neg { color: #f87171; }
.neu { color: var(--muted); }

/* SEPARATOR */
.sep {
  width: min(520px, 86vw);
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--teal-mid), transparent);
  margin-bottom: 32px;
}

/* BATTLE */
.battle-wrap { width: min(520px, 86vw); }

.battle-tokens {
  display:flex; justify-content:space-between; margin-bottom:14px;
}
.btok-name {
  font-size: clamp(12px, 2vw, 15px);
  font-weight: 700; letter-spacing: 2px;
}
.btok-mc {
  font-family: 'Share Tech Mono', monospace;
  font-size: clamp(9px, 1.4vw, 11px);
  margin-top: 4px;
  color: var(--muted);
}
.pigeon-side { text-align:left; }
.pump-side   { text-align:right; }
.pigeon-side .btok-name { color: #93c5fd; }
.pump-side   .btok-name { color: #f87171; }

.bar-track {
  width: 100%; height: 12px;
  background: rgba(255,255,255,0.05);
  border-radius: 2px; overflow:hidden;
  border: 1px solid rgba(255,255,255,0.07);
  margin-bottom: 10px;
}
.bar-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, rgba(0,140,110,0.9), var(--teal));
  transition: width 1.6s cubic-bezier(.4,0,.2,1);
  min-width: 1%;
  box-shadow: 4px 0 18px rgba(0,229,200,0.45);
  position:relative;
}
.bar-fill::after {
  content:''; position:absolute; inset:0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
  background-size: 200% 100%;
  animation: shimmer 2.5s linear infinite;
}
@keyframes shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position:  200% 0; }
}
.bar-caption {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; letter-spacing: 2px;
  color: var(--muted); text-align:center;
  min-height: 16px;
}

/* FOOTER */
footer {
  flex-shrink: 0;
  display:flex; flex-direction:column; align-items:center;
  padding: 14px 24px 16px;
  border-top: 1px solid var(--border);
  gap: 6px;
}
.footer-ca-row {
  display:flex; align-items:center; gap:12px; flex-wrap:wrap; justify-content:center;
}
.footer-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px; letter-spacing:4px;
  text-transform:uppercase; color:var(--teal); opacity:.6;
}
.footer-ca {
  font-family: 'Share Tech Mono', monospace;
  font-size: clamp(8px, 1.7vw, 11px);
  color: rgba(200,215,230,0.28);
  letter-spacing: 0.5px;
  cursor:pointer; transition: color .2s;
}
.footer-ca:hover { color: var(--teal); }
.footer-copy-btn {
  font-family: 'Cinzel', serif;
  font-size: 9px; letter-spacing:2px;
  color: var(--teal); background: transparent;
  border: 1px solid var(--teal-mid);
  padding: 4px 12px; border-radius: 2px;
  cursor:pointer; transition: background .2s, color .2s;
}
.footer-copy-btn:hover { background:var(--teal); color:#030508; }
.footer-note {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px; letter-spacing:2px;
  color: rgba(255,255,255,0.12); text-align:center;
}

@media (max-width: 480px) {
  nav { padding: 0 18px; }
  .nav-buy { font-size:10px; padding:8px 16px; letter-spacing:1px; }
}

<script>
(function(){
  const c=document.getElementById('particles');
  for(let i=0;i<16;i++){
    const el=document.createElement('div'); el.className='pt';
    const sz=1.5+Math.random()*3;
    el.style.cssText=`left:${Math.random()*100}vw;width:${sz}px;height:${sz}px;animation-duration:${10+Math.random()*18}s;animation-delay:${Math.random()*14}s;`;
    c.appendChild(el);
  }
})();

(function(){
  const b=document.getElementById('bird'); let running=false;
  function launch(){
    if(running)return; running=true;
    const goR=Math.random()>.5,vw=window.innerWidth,vh=window.innerHeight;
    const y=80+Math.random()*(vh*.55), dur=5000+Math.random()*3000;
    b.style.setProperty('--x0',(goR?-70:vw+70)+'px');
    b.style.setProperty('--x1',(goR?vw+70:-70)+'px');
    b.style.setProperty('--y0',y+'px');
    b.style.setProperty('--flip',goR?1:-1);
    b.style.display='block'; b.style.animation='none';
    void b.offsetWidth;
    b.style.animation=`birdFly ${dur}ms ease-in-out forwards`;
    setTimeout(()=>{b.style.display='none';b.style.animation='none';running=false;schedule();},dur+100);
  }
  function schedule(){setTimeout(launch,10000+Math.random()*20000);}
  setTimeout(launch,3000+Math.random()*4000);
})();

function copyCa(){
  navigator.clipboard.writeText('HpnfrxB1aw9oCoWBciKgCb1RwPUZrbtwEiHy7eakBiwx').then(()=>{
    const btn=document.getElementById('ca-btn');
    btn.textContent='Copied!';
    setTimeout(()=>btn.textContent='Copy',2000);
  });
}

function fmt(v){
  if(!v||isNaN(v))return'—';
  if(v>=1e9)return'$'+(v/1e9).toFixed(2)+'B';
  if(v>=1e6)return'$'+(v/1e6).toFixed(2)+'M';
  if(v>=1e3)return'$'+(v/1e3).toFixed(0)+'K';
  return'$'+v.toFixed(0);
}

async function fetchToken(addr){
  try{
    const r=await fetch(`https://api.dexscreener.com/latest/dex/tokens/${addr}`);
    const d=await r.json();
    if(!d.pairs||!d.pairs.length)return null;
    return d.pairs.sort((a,b)=>(b.volume?.h24||0)-(a.volume?.h24||0))[0];
  }catch(e){return null;}
}

async function update(){
  const[rip,pigeon,pump]=await Promise.all([
    fetchToken('HpnfrxB1aw9oCoWBciKgCb1RwPUZrbtwEiHy7eakBiwx'),
    fetchToken('4fSWEw2wbYEUCcMtitzmeGUfqinoafXxkhqZrA9Gpump'),
    fetchToken('pumpCmXqMfrsAkQ5r49WcJnRayYRqmXz6ae8H7H9Dfn'),
  ]);

  if(rip){
    const mc=rip.marketCap||rip.fdv||0;
    const ch=parseFloat(rip.priceChange?.h24);
    document.getElementById('rip-mcap').textContent=fmt(mc);
    const el=document.getElementById('rip-chg');
    if(!isNaN(ch)){
      el.textContent=(ch>=0?'+':'')+ch.toFixed(2)+'%  (24h)';
      el.className='mcap-chg '+(ch>=0?'pos':'neg');
    }
  }

  let pigMc=0,pmpMc=0;
  if(pigeon){pigMc=pigeon.marketCap||pigeon.fdv||0; document.getElementById('pigeon-mc').textContent=fmt(pigMc);}
  if(pump)  {pmpMc=pump.marketCap||pump.fdv||0;     document.getElementById('pump-mc').textContent=fmt(pmpMc);}

  if(pigMc>0&&pmpMc>0){
    const raw=(pigMc/pmpMc)*100;
    document.getElementById('battle-bar').style.width=Math.min(raw,100)+'%';
    document.getElementById('battle-cap').textContent=raw>=100
      ?'🕊️ PIGEON HAS OVERTAKEN PUMP — THE FUNERAL IS COMPLETE 🪦'
      :`$PIGEON is ${raw.toFixed(1)}% of $PUMP — ${fmt(pmpMc-pigMc)} to go`;
  }

  document.getElementById('last-upd').textContent='updated '+new Date().toLocaleTimeString();
}

update();
setInterval(update,60_000);
</script>
